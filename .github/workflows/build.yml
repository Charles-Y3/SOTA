name: Build SOTA

on:
  workflow_dispatch:      # "Run workflow" button on the Actions tab
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # setuptools>=81 finishes removing pkg_resources' legacy Provider
          # classes (setuptools' own deprecation warning says "pin to
          # Setuptools<81" for pkg_resources compatibility), which breaks
          # PyInstaller's bundled pyi_rth_pkgres runtime hook — the built
          # app crashes on launch with "AttributeError: module
          # 'pkg_resources' has no attribute 'NullProvider'" before any app
          # code runs. torch==2.13.0 independently requires
          # setuptools>=77.0.3, so both bounds must be resolved together in
          # one pip invocation (a separate preceding `pip install
          # setuptools<81` gets silently overridden when requirements.txt
          # is resolved next) — pinned range below satisfies both.
          pip install "setuptools>=77.0.3,<81" -r requirements.txt pyinstaller

      - name: Build SOTA.exe
        run: >
          pyinstaller --noconfirm --clean --windowed --name SOTA
          --collect-all customtkinter
          --collect-all tkinterdnd2
          --collect-all sounddevice
          --collect-all av
          --collect-all docx
          --collect-data faster_whisper
          --collect-all ctranslate2
          --collect-all llama_cpp
          --collect-all opencc
          --collect-all funasr
          --collect-all torch
          --collect-all torchaudio
          --hidden-import onnxruntime
          app.py

      # Same guard as the macOS job: prove the built exe actually launches
      # (--selftest opens the real UI and exits by itself after 1.5s).
      - name: Smoke-test the built app
        run: |
          $p = Start-Process -FilePath "dist\SOTA\SOTA.exe" -ArgumentList "--selftest" -PassThru
          if (-not $p.WaitForExit(60000)) { $p.Kill(); Write-Error "app did not exit within 60s"; exit 1 }
          if ($p.ExitCode -ne 0) { Write-Error "app exited with code $($p.ExitCode)"; exit 1 }

      - name: Bundle README with the app
        run: Copy-Item README.md dist\SOTA\README.md

      - name: Zip the app
        run: Compress-Archive -Path dist\SOTA\* -DestinationPath SOTA-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: SOTA-windows
          path: SOTA-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # See the matching comment in build-windows: PyInstaller's
          # pyi_rth_pkgres runtime hook breaks once pkg_resources' legacy
          # Provider classes are gone (setuptools>=81); torch needs
          # setuptools>=77.0.3, so both bounds are resolved in one call.
          pip install "setuptools>=77.0.3,<81" -r requirements.txt pyinstaller

      # Built from SOTA-mac.spec, not CLI flags: the spec bakes the
      # microphone-permission key into Info.plist at build time so
      # PyInstaller signs the bundle exactly once, over its final contents.
      # (v1.2.1 edited the plist after the build and re-signed — a broken
      # signature on Apple-silicon means the app dies instantly on launch.)
      - name: Build SOTA.app
        run: pyinstaller --noconfirm --clean SOTA-mac.spec

      # The one failure mode a green build doesn't catch is an app that
      # builds fine but dies on launch (exactly what v1.2.1 shipped).
      # --selftest opens the real UI and exits by itself after 1.5s, so a
      # clean exit here proves the bundle actually launches.
      - name: Smoke-test the built app
        run: |
          ./dist/SOTA.app/Contents/MacOS/SOTA --selftest &
          APP_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $APP_PID 2>/dev/null; then
              wait $APP_PID
              exit $?
            fi
            sleep 1
          done
          kill $APP_PID
          echo "app did not exit within 60s"
          exit 1

      - name: Verify the bundle's code signature
        run: codesign --verify --deep --strict dist/SOTA.app

      - name: Bundle README with the app
        run: |
          mkdir -p dist/SOTA-release
          cp -R dist/SOTA.app dist/SOTA-release/
          cp README.md dist/SOTA-release/

      - name: Zip the app (preserves permissions)
        run: ditto -c -k --keepParent dist/SOTA-release SOTA-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: SOTA-macOS
          path: SOTA-macOS.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SOTA-windows/SOTA-windows.zip
            artifacts/SOTA-macOS/SOTA-macOS.zip
